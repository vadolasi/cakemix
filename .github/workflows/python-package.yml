name: Python package

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.6", "3.7", "3.8", "3.9"]

    steps:
      - uses: actions/checkout@v2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install poetry
          poetry install
      - name: Auto format
        run: |
          poetry run isort .
          poetry run add-trailing-comma ./**/*.py
          poetry run pyformat --in-place ./**/*.py
      - name: Lint and test
        run: |
          poetry run safety check
          poetry run flakehell lint cakemix_python/ tests/
          poetry run pytest
          poetry run mypy ./**/*.py
